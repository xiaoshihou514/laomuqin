name: laomuqin
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_app_name_localization: ^0.1.0
  flutter_localizations:
    sdk: flutter

  file_picker: ^9.2.3
  flutter_recorder: ^1.1.1
  icons_launcher: ^3.0.3
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  sherpa_onnx: ^1.12.1
  shared_preferences: ^2.5.4
  tdesign_flutter: ^0.2.7
  wav: ^1.4.0
  dio: ^5.9.2
  archive: ^4.0.9
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  intl: ^0.20.2
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_app_name_localization:
  default: "老母亲"
  locales:
    - locale: "en"
      name: "laomuqin"

icons_launcher:
  image_path: "assets/icon.png"
  platforms:
    android:
      enable: true
    linux:
      enable: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
